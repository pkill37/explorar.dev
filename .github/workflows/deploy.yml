name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: out
          path: out/
          retention-days: 1

      - name: Upload corpus artifact
        uses: actions/upload-artifact@v4
        with:
          name: corpus
          path: |
            repos/
            avatars/
          retention-days: 1

  deploy-r2:
    name: Sync → Cloudflare R2
    needs: build
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: auto
    steps:
      - name: Download corpus artifact
        uses: actions/download-artifact@v4
        with:
          name: corpus
          path: .

      - name: Sync curated repos to R2
        run: |
          aws s3 sync repos/ s3://${{ secrets.R2_BUCKET_NAME }}/repos/ \
            --endpoint-url https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --delete \
            --no-progress

      - name: Sync avatars to R2
        run: |
          aws s3 sync avatars/ s3://${{ secrets.R2_BUCKET_NAME }}/avatars/ \
            --endpoint-url https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com \
            --delete \
            --no-progress

  deploy-cloudflare:
    name: Deploy → Cloudflare Pages
    needs: [build, deploy-r2]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: out
          path: out/

      - name: Remove R2-hosted dirs from Pages deploy
        run: rm -rf out/repos out/avatars

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: explorar-dev
          directory: out
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
